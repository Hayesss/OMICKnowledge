<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库管理 - OMICKnowledge</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%233b82f6'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='35' r='8' fill='white'/%3E%3Ccircle cx='50' cy='60' r='8' fill='white'/%3E%3Ccircle cx='35' cy='85' r='5' fill='white' opacity='0.7'/%3E%3Ccircle cx='65' cy='85' r='5' fill='white' opacity='0.7'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #262626;
      --bg-hover: #2d2d2d;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --border-color: #333333;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Navigation */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(13, 13, 13, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-gradient);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-link {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-link:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .nav-link.active {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    /* KB Selector Dropdown */
    .kb-selector {
      position: relative;
    }

    .kb-selector-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .kb-selector-btn:hover {
      background: var(--bg-hover);
    }

    .kb-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      min-width: 240px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: none;
      z-index: 1001;
      overflow: hidden;
    }

    .kb-dropdown.show {
      display: block;
    }

    .kb-dropdown-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kb-dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .kb-dropdown-item:hover {
      background: var(--bg-hover);
    }

    .kb-dropdown-item.active {
      background: var(--bg-hover);
      border-left-color: var(--accent-blue);
    }

    .kb-dropdown-item .kb-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .kb-dropdown-item .kb-info {
      flex: 1;
    }

    .kb-dropdown-item .kb-name {
      font-size: 14px;
      font-weight: 500;
    }

    .kb-dropdown-item .kb-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .kb-dropdown-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
    }

    .kb-dropdown-footer a {
      color: var(--accent-blue);
      text-decoration: none;
      font-size: 13px;
    }

    /* Main Content */
    .main-container {
      padding-top: 64px;
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 40px;
      padding-right: 40px;
      padding-bottom: 60px;
    }

    .page-header {
      padding: 48px 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .page-title h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .page-title p {
      color: var(--text-secondary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Current KB Card */
    .current-kb-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 32px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .current-kb-icon {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }

    .current-kb-info {
      flex: 1;
    }

    .current-kb-info h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .current-kb-info p {
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .current-kb-stats {
      display: flex;
      gap: 24px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-blue);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .current-kb-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* KB List */
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .kb-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .kb-card:hover {
      background: var(--bg-tertiary);
      transform: translateY(-4px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .kb-card.active {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .kb-card-header {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .kb-card-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .kb-card-title {
      flex: 1;
    }

    .kb-card-title h3 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .kb-card-title span {
      font-size: 12px;
      color: var(--text-muted);
    }

    .kb-card-description {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .kb-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .kb-card-actions {
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .kb-card:hover .kb-card-actions {
      opacity: 1;
    }

    .kb-card-actions button {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-header {
      padding: 24px 24px 0;
    }

    .modal-header h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .modal-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    .color-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-option {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .color-option:hover,
    .color-option.selected {
      border-color: white;
      transform: scale(1.1);
    }

    .modal-footer {
      padding: 0 24px 24px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      right: 40px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      padding: 16px 24px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(400px);
      transition: transform 0.3s;
      z-index: 3000;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.success {
      border-left: 4px solid var(--success);
    }

    .toast.error {
      border-left: 4px solid var(--error);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .empty-state p {
      margin-bottom: 24px;
    }

    /* Loading */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-container {
        padding-left: 20px;
        padding-right: 20px;
      }

      .page-header {
        flex-direction: column;
        gap: 20px;
      }

      .current-kb-card {
        flex-direction: column;
      }

      .kb-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/><path d="M6 5h2v14H6zM16 5h2v14h-2z" opacity="0.5"/></svg>
      </div>
      <span>OMICKnowledge</span>
    </a>
    
    <div class="nav-links">
      <a href="index.html" class="nav-link">首页</a>
      <a href="graph.html" class="nav-link">知识图谱</a>
      <a href="editor/index.html" class="nav-link">编辑器</a>
      <a href="kb_manager.html" class="nav-link active">知识库</a>
      <a href="settings.html" class="nav-link">设置</a>
    </div>

    <!-- KB Selector -->
    <div class="kb-selector">
      <button class="kb-selector-btn" onclick="toggleDropdown()">
        <span id="currentKbName">加载中...</span>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
      </button>
      <div class="kb-dropdown" id="kbDropdown">
        <div class="kb-dropdown-header">选择知识库</div>
        <div id="kbDropdownList"></div>
        <div class="kb-dropdown-footer">
          <a href="kb_manager.html">管理知识库</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Page Header -->
    <div class="page-header">
      <div class="page-title">
        <h1>知识库管理</h1>
        <p>创建和管理多个独立的知识库</p>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        创建知识库
      </button>
    </div>

    <!-- Current KB Card -->
    <div id="currentKbSection"></div>

    <!-- All KBs -->
    <h2 class="section-title">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
      所有知识库
    </h2>
    <div class="kb-grid" id="kbGrid"></div>
  </main>

  <!-- Create Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h3>创建新知识库</h3>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>知识库 ID</label>
          <input type="text" id="newKbId" placeholder="my-kb（仅限小写字母、数字和连字符）">
        </div>
        <div class="form-group">
          <label>名称</label>
          <input type="text" id="newKbName" placeholder="我的知识库">
        </div>
        <div class="form-group">
          <label>描述</label>
          <textarea id="newKbDesc" placeholder="描述这个知识库的用途..."></textarea>
        </div>
        <div class="form-group">
          <label>主题色</label>
          <div class="color-picker">
            <div class="color-option selected" style="background: #3b82f6" data-color="#3b82f6" onclick="selectColor(this)"></div>
            <div class="color-option" style="background: #22c55e" data-color="#22c55e" onclick="selectColor(this)"></div>
            <div class="color-option" style="background: #f59e0b" data-color="#f59e0b" onclick="selectColor(this)"></div>
            <div class="color-option" style="background: #ef4444" data-color="#ef4444" onclick="selectColor(this)"></div>
            <div class="color-option" style="background: #8b5cf6" data-color="#8b5cf6" onclick="selectColor(this)"></div>
            <div class="color-option" style="background: #ec4899" data-color="#ec4899" onclick="selectColor(this)"></div>
            <div class="color-option" style="background: #14b8a6" data-color="#14b8a6" onclick="selectColor(this)"></div>
            <div class="color-option" style="background: #6366f1" data-color="#6366f1" onclick="selectColor(this)"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="createKnowledgeBase()">创建</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toastIcon">✓</span>
    <span id="toastMessage">操作成功</span>
  </div>

  <script>
    // Global state
    let currentKb = null;
    let allKbs = [];
    let selectedColor = '#3b82f6';

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadKnowledgeBases();
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.kb-selector')) {
        document.getElementById('kbDropdown').classList.remove('show');
      }
    });

    async function loadKnowledgeBases() {
      try {
        const response = await fetch('/api/kb/list');
        const data = await response.json();
        
        if (data.success) {
          allKbs = data.knowledge_bases;
          currentKb = data.current;
          
          renderCurrentKb();
          renderKbGrid();
          renderDropdown();
          
          document.getElementById('currentKbName').textContent = currentKb ? currentKb.name : '未选择';
        }
      } catch (error) {
        console.error('Failed to load knowledge bases:', error);
        showToast('加载失败', 'error');
      }
    }

    function renderCurrentKb() {
      if (!currentKb) {
        document.getElementById('currentKbSection').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">?</div>
            <h3>未选择知识库</h3>
            <p>请创建或选择一个知识库开始</p>
          </div>
        `;
        return;
      }

      document.getElementById('currentKbSection').innerHTML = `
        <div class="current-kb-card">
          <div class="current-kb-icon" style="background: ${currentKb.color}20; color: ${currentKb.color}">
            ${currentKb.icon}
          </div>
          <div class="current-kb-info">
            <h2>${currentKb.name}</h2>
            <p>${currentKb.description || '暂无描述'}</p>
            <div class="current-kb-stats">
              <div class="stat">
                <div class="stat-value">${currentKb.entity_count}</div>
                <div class="stat-label">实体</div>
              </div>
              <div class="stat">
                <div class="stat-value">${new Date(currentKb.created_at).toLocaleDateString()}</div>
                <div class="stat-label">创建时间</div>
              </div>
            </div>
          </div>
          <div class="current-kb-actions">
            <a href="index.html" class="btn btn-primary">进入知识库</a>
            <a href="editor/index.html" class="btn btn-secondary">添加笔记</a>
          </div>
        </div>
      `;
    }

    function renderKbGrid() {
      const grid = document.getElementById('kbGrid');
      
      if (allKbs.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <h3>暂无知识库</h3>
            <p>点击上方按钮创建你的第一个知识库</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = allKbs.map(kb => `
        <div class="kb-card ${kb.id === currentKb?.id ? 'active' : ''}" onclick="switchKb('${kb.id}')">
          <div class="kb-card-header">
            <div class="kb-card-icon" style="background: ${kb.color}20; color: ${kb.color}">
              ${kb.icon}
            </div>
            <div class="kb-card-title">
              <h3>${kb.name}</h3>
              <span>${kb.id}</span>
            </div>
          </div>
          <div class="kb-card-description">
            ${kb.description || '暂无描述'}
          </div>
          <div class="kb-card-footer">
            <span>${kb.entity_count} 个实体</span>
            ${kb.id !== 'omics' ? `
              <div class="kb-card-actions">
                <button class="btn btn-secondary" onclick="event.stopPropagation(); deleteKb('${kb.id}', '${kb.name}')">删除</button>
              </div>
            ` : '<span style="font-size: 11px; color: var(--text-muted);">默认</span>'}
          </div>
        </div>
      `).join('');
    }

    function renderDropdown() {
      const list = document.getElementById('kbDropdownList');
      list.innerHTML = allKbs.map(kb => `
        <div class="kb-dropdown-item ${kb.id === currentKb?.id ? 'active' : ''}" onclick="switchKb('${kb.id}')">
          <div class="kb-icon" style="background: ${kb.color}20; color: ${kb.color}">
            ${kb.icon}
          </div>
          <div class="kb-info">
            <div class="kb-name">${kb.name}</div>
            <div class="kb-count">${kb.entity_count} 个实体</div>
          </div>
        </div>
      `).join('');
    }

    function toggleDropdown() {
      document.getElementById('kbDropdown').classList.toggle('show');
    }

    async function switchKb(id) {
      try {
        const response = await fetch('/api/kb/switch', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({id})
        });
        
        const data = await response.json();
        
        if (data.success) {
          currentKb = data.knowledge_base;
          document.getElementById('currentKbName').textContent = currentKb.name;
          document.getElementById('kbDropdown').classList.remove('show');
          
          renderCurrentKb();
          renderKbGrid();
          renderDropdown();
          
          showToast(`已切换到: ${currentKb.name}`);
        } else {
          showToast(data.error || '切换失败', 'error');
        }
      } catch (error) {
        showToast('切换失败', 'error');
      }
    }

    function openCreateModal() {
      document.getElementById('createModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('createModal').classList.remove('show');
      // Reset form
      document.getElementById('newKbId').value = '';
      document.getElementById('newKbName').value = '';
      document.getElementById('newKbDesc').value = '';
    }

    function selectColor(el) {
      document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedColor = el.dataset.color;
    }

    async function createKnowledgeBase() {
      const id = document.getElementById('newKbId').value.trim();
      const name = document.getElementById('newKbName').value.trim();
      const description = document.getElementById('newKbDesc').value.trim();

      if (!id || !name) {
        showToast('请填写 ID 和名称', 'error');
        return;
      }

      if (!/^[a-z][a-z0-9-]*$/.test(id)) {
        showToast('ID 格式错误：以小写字母开头，只能包含小写字母、数字和连字符', 'error');
        return;
      }

      try {
        const response = await fetch('/api/kb/create', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            id,
            name,
            description,
            color: selectedColor
          })
        });

        const data = await response.json();

        if (data.success) {
          showToast(`已创建: ${name}`);
          closeModal();
          loadKnowledgeBases();
        } else {
          showToast(data.error || '创建失败', 'error');
        }
      } catch (error) {
        showToast('创建失败', 'error');
      }
    }

    async function deleteKb(id, name) {
      if (!confirm(`确定要删除知识库 "${name}" 吗？\n\n此操作不可恢复，所有数据将被永久删除。`)) {
        return;
      }

      try {
        const response = await fetch(`/api/kb/delete?id=${id}`, {
          method: 'DELETE'
        });

        const data = await response.json();

        if (data.success) {
          showToast(`已删除: ${name}`);
          loadKnowledgeBases();
        } else {
          showToast(data.error || '删除失败', 'error');
        }
      } catch (error) {
        showToast('删除失败', 'error');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = message;
      document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '✗';
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>

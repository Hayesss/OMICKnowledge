<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多组学分析知识图谱</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
  <link rel="stylesheet" href="static/css/style.css">
  <script src="static/js/d3.v7.min.js"></script>
  <script src="static/js/dagre.min.js"></script>
</head>
<body>
  <header class="top-bar">
    <h1 class="logo">多组学知识图谱</h1>
    <nav class="view-switcher">
      <button id="btn-network" class="active" aria-pressed="true">网络视图</button>
      <button id="btn-flow" aria-pressed="false">流程视图</button>
    </nav>
    <div class="assay-selector">
      <label for="assay-select">组学:</label>
      <select id="assay-select" aria-label="选择组学"></select>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索节点..." aria-label="搜索节点">
      <div id="search-results" class="search-results" aria-live="polite"></div>
    </div>
  </header>

  <div class="main-container">
    <aside class="left-panel" aria-label="筛选器">
      <h2>筛选器</h2>
      
      <div class="filter-group">
        <h3>实体类型</h3>
        <div id="filter-types"></div>
      </div>
      
      <div class="filter-group">
        <h3>组学标签</h3>
        <div id="filter-tags"></div>
      </div>
      
      <div class="filter-group">
        <h3>难度等级</h3>
        <div id="filter-difficulty">
          <label><input type="radio" name="difficulty" value="all" checked> 全部</label>
          <label><input type="radio" name="difficulty" value="beginner"> 入门</label>
          <label><input type="radio" name="difficulty" value="intermediate"> 进阶</label>
          <label><input type="radio" name="difficulty" value="advanced"> 高级</label>
        </div>
      </div>
    </aside>

    <main class="viz-container">
      <svg id="viz-svg" role="img" aria-label="知识图谱可视化"></svg>
    </main>

    <aside class="right-panel" id="detail-panel" aria-label="节点详情">
      <div class="empty-state">
        <p>点击节点查看详情</p>
      </div>
    </aside>
  </div>

  <script src="static/js/network_view.js"></script>
  <script src="static/js/flow_view.js"></script>
  <script src="static/js/search_filter.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>

detailed_explanation: '## INTRODUCTION


  Comprehensive molecular profiling is transforming cancer research by linking genomic
  mutations to phenotypes via proteogenomic approaches. CPTAC has generated multi-omics
  data from prospectively collected tumors across 10 cancer cohorts, including genomics,
  transcriptomics, proteomics, and phosphoproteomics, with additional molecular classifications
  and clinical data. The data have been re-processed and harmonized to enable pan-cancer
  integrative analyses. Pan-cancer studies have revealed mechanisms of cancer development,
  including dysregulated DNA repair, metabolic regulation, and protein post-translational
  modifications. The datasets serve as a resource for the community to facilitate
  biological discoveries.'

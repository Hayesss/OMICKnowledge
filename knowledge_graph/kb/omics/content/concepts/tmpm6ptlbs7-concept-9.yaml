detailed_explanation: '## Introduction


  The introduction highlights the importance of comprehensive molecular profiling
  in cancer research, noting the limitations of sequencing-only approaches and the
  need for proteogenomic data to link genotype to phenotype. It describes CPTAC’s
  efforts to generate multi-omics data from freshly collected tumors to avoid ischemic
  artifacts and enable pan-cancer integrative analyses.'

detailed_explanation: '# Proteogenomic data and resources for pan-cancer analysis


  ## 摘要

  The National Cancer Institute’s Clinical Proteomic Tumor Analysis Consortium (CPTAC)
  generates harmonized multi-omics datasets including genomic, transcriptomic, proteomic,
  and clinical data for over 1000 tumors across 10 cancer cohorts. This resource facilitates
  pan-cancer investigations by providing consistent, reproducible data and computational
  tools. The paper outlines CPTAC’s efforts in data harmonization, dissemination,
  and computational resources, and discusses challenges in integrating nucleotide
  sequencing and mass spectrometry proteomics data.



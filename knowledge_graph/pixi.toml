[workspace]
name = "knowledge_graph"
version = "0.1.0"
description = "多组学分析知识图谱 - 基于 YAML 内容 + Python 构建脚本 + D3.js 可视化的轻量级知识图谱系统"
authors = [""]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.9"
pyyaml = ">=6.0.3,<7"
pytest = ">=7.0"
numpy = ">=1.20"
sentence-transformers = ">=2.0"
tqdm = ">=4.60"
pypdf2 = ">=3.0.1,<4"
pymupdf = ">=1.27.2.2,<2"
requests = ">=2.33.1,<3"
python-multipart = ">=0.0.24,<0.0.25"

[tasks]
# 校验内容 - 验证实体和边的有效性
validate = { cmd = "python scripts/validate.py" }

# 构建图谱 - 生成 web/data/graph.json
build = { cmd = "python scripts/build_graph.py" }

# 构建记忆库 - 将 YAML 内容转换为向量存储
build-memory = { cmd = "python -m memory_core.memory_builder" }

# 查询记忆库（交互模式）
query-memory = { cmd = "python -m memory_core.query" }

# 启动记忆库 API 服务器
serve-memory = { cmd = "python -m memory_core.server" }

# 运行测试
test = { cmd = "pytest tests/ -v" }

# 启动前端（端口 8080）
serve-web = { cmd = "python -m http.server 8080", cwd = "web" }

# 启动语义搜索界面
serve-memory-web = { cmd = "python -m http.server 8081", cwd = "web_memory" }

# 启动 Open WebUI（Docker）
serve-openwebui = { cmd = "echo '请查看 OPEN_WEBUI_GUIDE.md 启动 Docker' && docker run -d -p 3000:8080 --add-host=host.docker.internal:host-gateway -v open-webui:/app/backend/data --name open-webui ghcr.io/open-webui/open-webui:main || echo '容器可能已存在，访问 http://localhost:3000'" }

# 一键启动前后端（前台运行，Ctrl+C 停止全部）
# 用法: pixi run up
# 用法: pixi run up -- --api-port 8001 --web-port 8081
up = { cmd = "python scripts/start_all.py" }

# 一键启动（后台模式，可通过环境变量指定端口）
# 用法: API_PORT=8001 WEB_PORT=8081 pixi run up-bg
up-bg = { cmd = "echo '启动 OMICKnowledge (后台模式)...' && python -m memory_core.server --store kb/omics/memory_store --port ${API_PORT:-8000} > server.log 2>&1 & echo $! > .api.pid && cd web && python -m http.server ${WEB_PORT:-8080} > ../web.log 2>&1 & echo $! > ../.web.pid && echo 'API: http://localhost:'${API_PORT:-8000} && echo 'Web: http://localhost:'${WEB_PORT:-8080} && echo '日志: server.log, web.log'" }

# 停止后台服务
stop = { cmd = "[ -f .api.pid ] && kill $(cat .api.pid) 2>/dev/null && rm .api.pid && echo 'API 已停止' || echo 'API 未运行' && [ -f .web.pid ] && kill $(cat .web.pid) 2>/dev/null && rm .web.pid && echo 'Web 已停止' || echo 'Web 未运行'" }

# 使用指定端口启动（示例: API 用 8001，Web 用 8081）
up-8001 = { cmd = "python scripts/start_all.py --api-port 8001 --web-port 8081" }

# 完整启动流程（传统图谱）：校验 → 构建 → 测试 → 启动服务器
start = { depends-on = ["validate", "build", "test", "serve-web"] }

# 完整启动流程（记忆库）：构建记忆库 → 启动 API
start-memory = { depends-on = ["build-memory", "serve-memory"] }

# 仅构建和验证（不启动服务器）
prep = { depends-on = ["validate", "build", "test"] }

# ==================== llm-wiki 任务 ====================

# 导出 YAML 到 Wiki
export-wiki = { cmd = "python scripts/yaml_to_wiki.py" }

# 导出单个实体到 Wiki
export-wiki-entity = { cmd = "python scripts/yaml_to_wiki.py --entity" }

# 完整构建（YAML → Wiki → Memory → Graph）
build-all = { depends-on = ["validate", "export-wiki", "build", "build-memory"] }

# 启动 Wiki 本地服务器（查看生成的 Markdown）
serve-wiki = { cmd = "python -m http.server 8082", cwd = "wiki" }

id: fdr
name: False Discovery Rate (FDR)
type: concept
description: 错误发现率，即在所有被判定为显著的检验中，错误拒绝原假设的预期比例。
difficulty: intermediate
tags: ["statistics", "peak-calling", "differential-analysis"]
source: manual
last_updated: "2026-04-01"
detailed_explanation: |
  FDR = E[V/R | R > 0] * P(R > 0)，其中 V 是假阳性数，R 是总拒绝数。
  在 peak calling 中，常用 q-value 控制 FDR。与 p-value 相比，FDR 更适合大规模多重检验场景。
common_misconceptions:
  - "q-value 和 p-value 是一样的"（错误，q-value 考虑了多重检验校正）

id: fragment-size
name: Fragment Size
type: concept
description: ATAC-seq 中 DNA 片段的大小分布，反映了核小体占位和开放染色质特征。
difficulty: beginner
tags: ["atac-seq", "qc", "nucleosome"]
source: manual
last_updated: "2026-04-01"
detailed_explanation: |
  ATAC-seq 的 fragment size 分布通常呈现周期性峰：
  - ~50 bp：无核小体区域（NFR），代表开放染色质
  - ~200 bp：单核小体区域
  - ~400 bp：双核小体区域
  通过分析 fragment size 分布可以评估 ATAC-seq 数据质量。
common_misconceptions:
  - "fragment size 越大越好"（错误，不同大小反映不同生物学状态）

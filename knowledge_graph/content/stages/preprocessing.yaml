detailed_explanation: 数据预处理是 ATAC-seq 分析流程的基石，直接决定后续 peak calling 和差异分析的可靠性。该阶段的核心任务包括：1)
  原始数据质量评估（FastQC/MultiQC），检查碱基质量、GC 偏倚、接头污染和序列重复水平；2) 接头去除和低质量碱基修剪（cutadapt/Trimmomatic），确保输入比对的
  reads 质量；3) 序列比对到参考基因组（Bowtie2/BWA-MEM），考虑 ATAC-seq 片段的短插入特性；4) 比对后过滤，包括去除 PCR 重复（Picard/sambamba）、过滤低质量比对（MAPQ
  < 30）、去除线粒体 DNA（chrM，通常占 ATAC-seq reads 的 10-50%）以及去除多比对 reads。严格的预处理能显著降低技术噪音，提高开放区域检测的灵敏度和特异性。

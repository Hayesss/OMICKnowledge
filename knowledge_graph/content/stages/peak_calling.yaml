detailed_explanation: Peak calling 是 ATAC-seq 分析的核心环节，旨在从预处理后的 BAM 文件中识别统计显著的染色质开放区域（peaks）。ATAC-seq
  利用 Tn5 转座酶优先切割核小体缺失区域（Nucleosome-Free Regions, NFR），这些区域会富集大量测序 reads，在基因组上形成信号峰。Peak
  caller（如 MACS2、HOMER、Genrich）通过建立局部背景模型（通常是泊松分布或负二项分布），比较每个基因组窗口内的 reads 密度与周围背景及对照样本的差异，从而确定显著开放的区域。针对
  ATAC-seq 数据，需要特别注意参数调整：由于 Tn5 在 DNA 双链上切割后会产生 9 bp 的粘性末端，实际的开放中心位于 reads 起始位置的 +4.5
  bp 处，因此通常设置 --shift -75 和 --extsize 150 来准确模拟片段中心。输出结果包括 peak 坐标（BED/NarrowPeak）、信号强度文件（bedGraph/bigWig）和质量评估指标（如
  FRiP score：reads in peaks 比例）。

id: scrna-pca
name: 线性降维 (PCA)
type: step
description: 使用主成分分析将高维基因表达数据投影到低维空间，保留主要变异来源。
difficulty: intermediate
tags: ["scRNA-seq", "dimensionality-reduction", "pca"]
source: manual
last_updated: "2026-04-02"
input: "归一化后的高变基因矩阵"
output: "主成分坐标（PC scores）"
key_params:
  - name: npcs
    description: 保留的主成分数量
    default: "30"
detailed_explanation: |
  单细胞数据通常包含 2 万多个基因维度，直接计算细胞间距离非常稀疏且噪音大。PCA 通过线性变换将数据投影到一组正交的主成分上，每个主成分代表一个独立的变异来源。
  通常保留前 30-50 个主成分用于下游分析，这些主成分已经捕获了大部分生物学信号（如细胞类型差异、细胞周期状态），同时有效降低了计算复杂度和技术噪音。Elbow plot 和 JackStraw 分析可用于辅助确定最佳 PC 数量。

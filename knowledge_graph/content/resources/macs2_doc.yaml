detailed_explanation: MACS2 官方文档是学习和使用该工具最权威的资料来源，内容涵盖安装指南、命令行参数详解、标准分析流程、高级使用技巧和常见问题解答。对于初学者，建议从
  GitHub README 和 Wiki 中的示例脚本入手，理解 callpeak、bdgcmp、bdgdiff 等子命令的基本用法；对于进阶用户，推荐阅读源码中的统计模型说明，深入理解泊松分布、局部
  lambda 背景估计、动态峰宽计算等算法细节。文档中还包含了不同数据类型（ChIP-seq、ATAC-seq、CUT&Tag）的参数推荐、bug 修复记录和社区贡献的扩展工具链接。熟练掌握官方文档是进行高质量
  peak calling 和故障排查的基础。

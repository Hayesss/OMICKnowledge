version: '3.8'

services:
  # Knowledge Graph API
  kg-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./memory_store:/app/memory_store:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - kg-network

  # Optional: Open WebUI integration
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - ENABLE_SIGNUP=true
      - DEFAULT_LOCALE=zh-CN
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped
    depends_on:
      kg-api:
        condition: service_healthy
    networks:
      - kg-network
    # Note: On Linux, add to extra_hosts or use host network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optional: Ollama for local LLM
  ollama:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - kg-network

networks:
  kg-network:
    driver: bridge

volumes:
  open-webui-data:
  ollama-data:

version: '3.8'

services:
  # Knowledge Graph API
  kg-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./memory_store:/app/memory_store:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - kg-network
    environment:
      - PYTHONUNBUFFERED=1

  # Open WebUI
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - ENABLE_SIGNUP=true
      - DEFAULT_LOCALE=zh-CN
      - WEBUI_AUTH=True
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped
    depends_on:
      - kg-api
    networks:
      - kg-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Linux 需要使用 host 网络或配置 host.docker.internal
    # 生产环境建议配置 OLLAMA_BASE_URL 指向外部 Ollama 服务

  # Ollama (可选，本地 LLM 服务)
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - kg-network
    # GPU 支持 (可选)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  kg-network:
    driver: bridge

volumes:
  open-webui-data:
  ollama-data:
